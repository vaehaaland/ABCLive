<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: oklch(0.08 0.016 282); font-family: 'Inter', sans-serif; padding: 20px; }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: oklch(0.68 0.26 292 / 20%); border: 1.5px solid oklch(0.68 0.26 292 / 50%); }
  .label { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: oklch(0.55 0.010 282); text-align: center; }
  .val { font-size: 10px; color: oklch(0.68 0.26 292); font-variant-numeric: tabular-nums; font-weight: 600; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="width:36px;height:24px;border-radius:0.375rem"></div><div class="label">sm</div><div class="val">0.375rem</div></div>
  <div class="item"><div class="box" style="width:44px;height:28px;border-radius:0.625rem"></div><div class="label">md</div><div class="val">0.625rem</div></div>
  <div class="item"><div class="box" style="width:52px;height:32px;border-radius:1rem"></div><div class="label">lg</div><div class="val">1rem</div></div>
  <div class="item"><div class="box" style="width:60px;height:38px;border-radius:1.5rem"></div><div class="label">xl</div><div class="val">1.5rem</div></div>
  <div class="item"><div class="box" style="width:70px;height:44px;border-radius:2rem"></div><div class="label">2xl</div><div class="val">2rem</div></div>
  <div class="item"><div class="box" style="width:50px;height:50px;border-radius:9999px"></div><div class="label">full</div><div class="val">∞</div></div>
</div>
</body>
</html>
