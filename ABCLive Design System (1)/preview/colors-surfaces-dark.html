<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Manrope:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: oklch(0.05 0.012 282); font-family: 'Inter', sans-serif; padding: 20px; }
  .row { display: flex; gap: 6px; }
  .swatch { flex: 1; border-radius: 10px; padding: 14px 12px; }
  .label { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 10px; color: oklch(0.97 0.005 282); margin-bottom: 3px; }
  .val { font-size: 9px; color: oklch(0.55 0.010 282); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:oklch(0.08 0.016 282)"><div class="label">Surface</div><div class="val">0.08 0.016 282</div></div>
  <div class="swatch" style="background:oklch(0.11 0.016 282)"><div class="label">Surface Low</div><div class="val">0.11 0.016 282</div></div>
  <div class="swatch" style="background:oklch(0.16 0.016 282)"><div class="label">Container</div><div class="val">0.16 0.016 282</div></div>
  <div class="swatch" style="background:oklch(0.21 0.016 282)"><div class="label">High</div><div class="val">0.21 0.016 282</div></div>
  <div class="swatch" style="background:oklch(0.27 0.016 282)"><div class="label">Highest</div><div class="val">0.27 0.016 282</div></div>
</div>
</body>
</html>
